<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIDOL — 월드투어 엔딩</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.wrap{width:390px;height:844px;position:relative;overflow:hidden;border-radius:24px;box-shadow:0 0 60px rgba(201,168,76,.3)}
@media(max-width:430px){body{align-items:flex-start}.wrap{width:100vw;height:100svh;border-radius:0;box-shadow:none}}

/* BG IMAGE */
.bg-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:top center;
  z-index:0;
}

/* GRADIENT OVERLAY */
.overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.35) 0%,
    rgba(0,0,0,.1) 40%,
    rgba(0,0,0,.65) 65%,
    rgba(0,0,0,.9) 100%
  );
}

/* PARTICLES */
.particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.p{position:absolute;border-radius:50%;animation:pfloat linear infinite;opacity:0}
@keyframes pfloat{
  0%{transform:translateY(900px) scale(0);opacity:0}
  10%{opacity:.9}
  90%{opacity:.4}
  100%{transform:translateY(-100px) scale(1.5);opacity:0}
}

/* CONTENT */
.content{
  position:absolute;bottom:0;left:0;right:0;
  z-index:3;
  padding:0 24px 44px;
  display:flex;flex-direction:column;gap:0;
}

.week{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;color:rgba(255,255,255,.4);
  letter-spacing:4px;margin-bottom:14px;
  animation:up .6s ease .2s both;
}
.icon{font-size:48px;margin-bottom:10px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275) .4s both}
@keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:700;
  color:#fff;letter-spacing:3px;
  line-height:1.2;margin-bottom:5px;
  animation:up .6s ease .6s both;
}
.title-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;font-style:italic;
  color:rgba(201,168,76,.85);
  margin-bottom:18px;
  animation:up .6s ease .75s both;
}
.story{
  font-family:'Noto Serif KR',serif;
  font-size:13px;line-height:2;
  color:rgba(255,255,255,.8);
  background:rgba(0,0,0,.5);
  border-left:2px solid #c9a84c;
  padding:13px 16px;
  border-radius:0 12px 12px 0;
  margin-bottom:16px;
  animation:up .6s ease .9s both;
}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;animation:up .6s ease 1.1s both}
.chip{
  padding:5px 14px;border-radius:20px;
  font-family:'Cormorant Garamond',serif;
  font-size:12px;letter-spacing:.5px;
  border:1px solid rgba(201,168,76,.55);
  color:#c9a84c;background:rgba(201,168,76,.08);
}
.btn{
  padding:14px;border-radius:14px;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:2px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.8);
  animation:up .6s ease 1.3s both;
  transition:background .2s;
}
.btn:active{background:rgba(255,255,255,.18)}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
</style>
</head>
